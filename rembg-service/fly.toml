# fly.toml — deploy with: fly launch (first time) or fly deploy
app = "dtf-rembg-service"
primary_region = "iad"

[build]

[env]
  PORT = "8000"
  U2NET_HOME = "/app/models"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 10
    soft_limit = 5

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2

[mounts]
  source = "models_cache"
  destination = "/app/models"
